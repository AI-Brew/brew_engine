services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: myaimentor-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: mentor
      POSTGRES_PASSWORD: mentor1234
      POSTGRES_DB: myaimentor
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mongodb:
    image: mongo:7
    container_name: myaimentor-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: mentor
      MONGO_INITDB_ROOT_PASSWORD: mentor1234
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  postgres_data:
  mongo_data:
